<div class="modal-backdrop" *ngIf="open" (click)="onClose()"></div>
<div class="modal" *ngIf="open">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <button class="close-btn" (click)="onClose()" aria-label="Close">&times;</button>
    <div class="modal-body">
      <img [src]="product?.image" [alt]="product?.name" class="modal-image" *ngIf="product?.image">
      <h2>{{ product?.name }}</h2>
      <p class="category">{{ product?.category }}</p>
      <p class="description">{{ product?.description }}</p>
      <div *ngIf="product?.specs">
        <h4>Specifications</h4>
        <ul class="spec-list">
          <li *ngFor="let spec of product.specs">{{ spec }}</li>
        </ul>
      </div>
      <div class="modal-footer">
        <button class="btn-enquire" (click)="onEnquire()">Enquire Now</button>
      </div>
    </div>
  </div>
</div>
