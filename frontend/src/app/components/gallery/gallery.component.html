<div class="gallery-container">
  <div class="container">
    <section class="gallery-hero">
      <h1>Photo Gallery</h1>
      <p>Browse our product collection organized by category</p>
    </section>

    <!-- Category Filter -->
    <section class="category-filter">
      <button 
        class="filter-btn" 
        [class.active]="!selectedCategory"
        (click)="clearFilter()"
      >
        All Categories
      </button>
      <button 
        *ngFor="let category of categories"
        class="filter-btn" 
        [class.active]="selectedCategory === category"
        (click)="filterByCategory(category)"
      >
        {{ category }}
      </button>
    </section>

    <!-- Loading State -->
    <div *ngIf="loading" class="loading">
      <p>Loading gallery...</p>
    </div>

    <!-- Error State -->
    <div *ngIf="error && !loading" class="error-message">
      <p>{{ error }}</p>
    </div>

    <!-- Gallery Grid -->
    <section class="gallery-grid" *ngIf="!loading && filteredProducts.length > 0">
      <div class="gallery-item" *ngFor="let product of filteredProducts">
        <div class="gallery-image-wrapper">
          <img 
            [src]="getProductImage(product)" 
            [alt]="product.name"
            class="gallery-image"
            (error)="onImageError($event)"
          />
          <div class="gallery-overlay">
            <a [routerLink]="['/products', product._id]" class="view-details">View Details</a>
          </div>
        </div>
        <div class="gallery-info">
          <h3>{{ product.name }}</h3>
          <p class="category">{{ product.category }}</p>
        </div>
      </div>
    </section>

    <!-- No Products State -->
    <div *ngIf="!loading && filteredProducts.length === 0" class="no-products">
      <p>No products found in this category.</p>
    </div>
  </div>
</div>
